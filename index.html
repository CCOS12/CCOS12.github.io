<html lang="en">
	<head>
		<title>Chase's Wedding Reveal</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

		<style>
			:root {
				--wedding-gold: #c9a24a;
				--wedding-blush: #f7e8e8;
				--wedding-ink: #2d2630;
			}

			body {
				font-family: 'Montserrat', Arial, sans-serif;
			}

			#wrapper {
				max-width: 980px;
			}

			#main {
				border-radius: 1.25rem;
				overflow: hidden;
			}

			.wedding-hero {
				text-align: center;
				padding: 4rem 2rem 2rem 2rem;
				background: linear-gradient(135deg, #ffffff 0%, var(--wedding-blush) 100%);
			}

			.wedding-hero .kicker {
				letter-spacing: 0.2em;
				text-transform: uppercase;
				font-size: 0.8rem;
				font-weight: 700;
				color: var(--wedding-gold);
				margin-bottom: 0.75rem;
			}

			.wedding-hero h1 {
				font-size: clamp(2.1rem, 7vw, 4.3rem);
				line-height: 1.05;
				margin: 0 0 1rem 0;
				color: var(--wedding-ink);
			}

			.wedding-hero p {
				max-width: 650px;
				margin: 0 auto;
				font-size: 1.1rem;
			}

			.reveal-card {
				max-width: 700px;
				margin: 0 auto;
				padding: 2rem;
				border: 1px solid rgba(201, 162, 74, 0.25);
				border-radius: 1.5rem;
				background: rgba(255, 255, 255, 0.82);
				box-shadow: 0 1rem 2.5rem rgba(45, 38, 48, 0.08);
			}

			.name-form {
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 0.75rem;
				margin-top: 1.5rem;
			}

			.name-form input {
				border-radius: 999px;
				padding: 0 1.1rem;
				font-size: 1rem;
				min-height: 3.1rem;
			}

			.name-form button {
				border-radius: 999px;
				background: var(--wedding-gold) !important;
				box-shadow: none;
				color: #fff !important;
			}

			.reveal-area {
				margin-top: 2rem;
				min-height: 230px;
				display: none;
			}

			.reveal-area.show {
				display: block;
			}

			.reveal-line {
				opacity: 0;
				transform: translateY(14px);
				transition: opacity 700ms ease, transform 700ms ease;
				margin-bottom: 1rem;
				font-size: 1.05rem;
			}

			.reveal-line.visible {
				opacity: 1;
				transform: translateY(0);
			}

			.final-question {
				font-size: clamp(1.7rem, 5vw, 3rem);
				font-weight: 700;
				line-height: 1.12;
				color: var(--wedding-ink);
				margin-top: 1.5rem;
			}

			.gold {
				color: var(--wedding-gold);
			}

			.loading-dots span {
				animation: blink 1.2s infinite both;
			}

			.loading-dots span:nth-child(2) {
				animation-delay: 0.2s;
			}

			.loading-dots span:nth-child(3) {
				animation-delay: 0.4s;
			}

			@keyframes blink {
				0%, 80%, 100% { opacity: 0; }
				40% { opacity: 1; }
			}

			.confetti {
				position: fixed;
				top: -1rem;
				width: 0.7rem;
				height: 0.7rem;
				border-radius: 50%;
				animation: fall linear forwards;
				z-index: 9999;
			}

			@keyframes fall {
				to {
					transform: translateY(105vh) rotate(720deg);
					opacity: 0;
				}
			}

			.hint {
				font-size: 0.9rem;
				opacity: 0.75;
				margin-top: 0.75rem;
			}

			#errorMsg {
				color: #b34b4b;
				font-weight: 700;
				margin-top: 1rem;
				display: none;
			}

			/* iPhone / small-screen layout */
			@media screen and (max-width: 736px) {
				html,
				body {
					width: 100%;
					overflow-x: hidden;
				}

				body {
					min-width: 0;
				}

				#wrapper {
					width: 100%;
					max-width: none;
					padding: 0.75rem;
				}

				#main {
					border-radius: 1rem;
				}

				.wedding-hero {
					padding: 2.5rem 1rem 1.25rem 1rem;
				}

				.wedding-hero .kicker {
					font-size: 0.68rem;
					letter-spacing: 0.14em;
					line-height: 1.5;
				}

				.wedding-hero h1 {
					font-size: clamp(2rem, 12vw, 3rem);
				}

				section.main,
				section.main.special {
					padding: 1.25rem 1rem;
				}

				.reveal-card {
					width: 100%;
					max-width: 100%;
					padding: 1.25rem 1rem;
					border-radius: 1.1rem;
				}

				.reveal-card .major h2 {
					font-size: 1.25rem;
					line-height: 1.25;
				}

				.name-form {
					display: flex;
					flex-direction: column;
					gap: 0.85rem;
				}

				.name-form input,
				.name-form button {
					width: 100%;
				}

				.name-form input {
					box-sizing: border-box;
					min-height: 3.3rem;
					font-size: 1rem;
					text-align: center;
				}

				.name-form button {
					min-height: 3.3rem;
					padding: 0 1rem;
					line-height: 3.3rem;
				}

				.reveal-area {
					min-height: 190px;
					margin-top: 1.5rem;
				}

				.reveal-line {
					font-size: 1rem;
					line-height: 1.5;
				}

				.final-question {
					font-size: clamp(1.65rem, 9vw, 2.35rem);
					line-height: 1.15;
					word-wrap: break-word;
				}

				#errorMsg {
					font-size: 0.95rem;
					line-height: 1.45;
				}

				#footer {
					padding: 1.5rem 1rem;
					text-align: center;
				}
			}

			/* Extra-tight phones such as older/smaller iPhones */
			@media screen and (max-width: 380px) {
				#wrapper {
					padding: 0.5rem;
				}

				.wedding-hero {
					padding-top: 2rem;
				}

				.reveal-card {
					padding: 1rem 0.8rem;
				}

				.final-question {
					font-size: 1.55rem;
				}
			}
		</style>
	</head>

	<body class="is-preload">
		<div id="wrapper">
			<div id="main">
				<section id="intro" class="wedding-hero">
					<p class="kicker">An official wedding announcement</p>
					<h1>Chase's Wedding</h1>
				</section>

				<section id="reveal" class="main special">
					<div class="reveal-card">
						<header class="major">
							<h2>Enter your name to unlock the message</h2>
						</header>

						<form id="nameForm" class="name-form">
							<input id="guestName" name="guestName" type="text" placeholder="Type your name here..." autocomplete="given-name" required />
							<button type="submit" class="button primary">Reveal</button>
						</form>

						<p id="errorMsg">Hmm... this message is only for the chosen few. Check the spelling and try again.</p>

						<div id="revealArea" class="reveal-area" aria-live="polite">
							<p id="loadingText" class="reveal-line loading-dots">Searching<span>.</span><span>.</span><span>.</span></p>
							<p id="lineOne" class="reveal-line"></p>
							<p id="lineTwo" class="reveal-line"></p>
							<p id="lineThree" class="reveal-line"></p>
							<p id="finalQuestion" class="reveal-line final-question"></p>
						</div>
					</div>
				</section>
			</div>

			<footer id="footer">
				<p class="copyright">&copy; 2026 Chase Costa.</p>
			</footer>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/jquery.scrollex.min.js"></script>
		<script src="assets/js/jquery.scrolly.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>

		<script>
			const weddingParty = {
				"tyler": {
					name: "tyler",
					role: "brother",
					question: "will you be my groomsman?"
				},
				"dane": {
					name: "dane",
					role: "brother",
					question: "will you be my groomsman?"
				},
				"chloe": {
					name: "chloe",
					role: "sister",
					question: "will you be my groomsgirl?"
				}
			};

			const form = document.querySelector("#nameForm");
			const input = document.querySelector("#guestName");
			const errorMsg = document.querySelector("#errorMsg");
			const revealArea = document.querySelector("#revealArea");
			const lines = [
				document.querySelector("#loadingText"),
				document.querySelector("#lineOne"),
				document.querySelector("#lineTwo"),
				document.querySelector("#lineThree"),
				document.querySelector("#finalQuestion")
			];

			function normaliseName(name) {
				return name.trim().toLowerCase();
			}

			function clearReveal() {
				lines.forEach(line => line.classList.remove("visible"));
				document.querySelector("#lineOne").textContent = "";
				document.querySelector("#lineTwo").textContent = "";
				document.querySelector("#lineThree").textContent = "";
				document.querySelector("#finalQuestion").textContent = "";
			}

			function showLine(element, delay) {
				setTimeout(() => element.classList.add("visible"), delay);
			}

			function launchConfetti() {
				const colours = ["#c9a24a", "#f7caca", "#ffffff", "#b7829a", "#2d2630"];
				for (let i = 0; i < 70; i++) {
					const piece = document.createElement("span");
					piece.className = "confetti";
					piece.style.left = Math.random() * 100 + "vw";
					piece.style.background = colours[Math.floor(Math.random() * colours.length)];
					piece.style.animationDuration = (Math.random() * 2 + 2.5) + "s";
					piece.style.animationDelay = Math.random() * 0.4 + "s";
					document.body.appendChild(piece);
					setTimeout(() => piece.remove(), 5200);
				}
			}

			form.addEventListener("submit", function(event) {
				event.preventDefault();

				const enteredName = normaliseName(input.value);
				const person = weddingParty[enteredName];

				clearReveal();
				errorMsg.style.display = "none";

				if (!person) {
					revealArea.classList.remove("show");
					errorMsg.style.display = "block";
					return;
				}

				revealArea.classList.add("show");
				lines[0].classList.add("visible");

				document.querySelector("#lineOne").textContent = `${person.name}, your name has been approved.`;
				document.querySelector("#finalQuestion").innerHTML = `<span class="gold">${person.name}</span>, ${person.question}`;

				showLine(lines[1], 2000);
				showLine(lines[4], 4000);
				setTimeout(launchConfetti, 4500);
			});
		</script>
	</body>
</html>
